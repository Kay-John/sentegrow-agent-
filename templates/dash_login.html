<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login — SenteGrow Dashboard</title>
<link rel="manifest" href="/static/manifest.json">
<meta name="theme-color" content="#1a56db">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="SenteGrow">
<link rel="apple-touch-icon" href="/static/icon-192.png">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', sans-serif; background: linear-gradient(135deg, #1a56db, #0e9f6e); min-height: 100vh; display: flex; align-items: center; justify-content: center; }
  .card { background: white; border-radius: 16px; padding: 40px 32px; width: 100%; max-width: 380px; box-shadow: 0 20px 60px rgba(0,0,0,0.2); }
  h1 { font-size: 1.5rem; color: #1a202c; margin-bottom: 6px; }
  p { color: #718096; font-size: 0.9rem; margin-bottom: 28px; }
  label { display: block; font-size: 0.85rem; font-weight: 600; color: #4a5568; margin-bottom: 6px; }
  input { width: 100%; padding: 12px; border: 1px solid #e2e8f0; border-radius: 8px; font-size: 0.95rem; margin-bottom: 16px; outline: none; }
  input:focus { border-color: #1a56db; }
  button { width: 100%; padding: 13px; background: linear-gradient(135deg, #1a56db, #0e9f6e); color: white; border: none; border-radius: 8px; font-size: 1rem; font-weight: 600; cursor: pointer; }
  .error { background: #fff5f5; border-left: 4px solid #fc8181; padding: 10px 14px; border-radius: 6px; color: #c53030; font-size: 0.88rem; margin-bottom: 16px; }
</style>
</head>
<body>
<div class="card">
  <h1>SenteGrow Dashboard</h1>
  <p>Sign in to manage your WhatsApp bot</p>
  {% if error %}
  <div class="error">{{ error }}</div>
  {% endif %}
  <form method="POST" action="/dashboard/login">
    <label>Username</label>
    <input type="text" name="username" placeholder="Enter username" required autofocus>
    <label>Password</label>
    <input type="password" name="password" placeholder="Enter password" required>
    <button type="submit">Sign In</button>
  </form>
</div>
<script>
if ('serviceWorker' in navigator) navigator.serviceWorker.register('/static/sw.js').catch(()=>{});
</script>
</body>
</html>
